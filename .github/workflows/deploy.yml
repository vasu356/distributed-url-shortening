name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

  # Manual trigger for rollbacks or hotfixes
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (e.g. sha-abc1234)'
        required: true
        type: string
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

jobs:

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: >
      (github.event.workflow_run.conclusion == 'success' ||
       github.event_name == 'workflow_dispatch') &&
      vars.K8S_DEPLOY_ENABLED == 'true'
    environment:
      name: staging
      url: https://staging.short.example.com
    concurrency:
      group: deploy-staging
      cancel-in-progress: false   # never cancel in-progress deploys

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          fi

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_STAGING }}

      - name: Verify cluster connectivity
        run: kubectl cluster-info --context staging

      - name: Update image in deployment
        run: |
          kubectl set image deployment/url-shortener-api \
            url-shortener-api=ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.tag }} \
            -n url-shortener

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/url-shortener-api \
            -n url-shortener \
            --timeout=300s

      - name: Verify health after deploy
        run: |
          sleep 10  # wait for pods to become ready
          kubectl run health-check --rm -i --restart=Never \
            --image=curlimages/curl:8.6.0 \
            -- curl -sf http://url-shortener-api.url-shortener/actuator/health \
            && echo "Health check passed"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deploy failed — rolling back"
          kubectl rollout undo deployment/url-shortener-api -n url-shortener
          kubectl rollout status deployment/url-shortener-api -n url-shortener --timeout=120s
          echo "Rollback complete"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && vars.K8S_DEPLOY_ENABLED == 'true'
    environment:
      name: production
      url: https://short.example.com
    # Production deploy requires explicit manual approval
    # Configured via GitHub Environment protection rules
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_PRODUCTION }}

      - name: Record pre-deploy state (for rollback reference)
        run: |
          kubectl get deployment url-shortener-api -n url-shortener \
            -o jsonpath='{.spec.template.spec.containers[0].image}' > /tmp/previous-image.txt
          echo "Previous image: $(cat /tmp/previous-image.txt)"

      - name: Deploy to production
        run: |
          kubectl set image deployment/url-shortener-api \
            url-shortener-api=ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.tag }} \
            -n url-shortener

      - name: Wait for production rollout
        run: |
          kubectl rollout status deployment/url-shortener-api \
            -n url-shortener \
            --timeout=600s

      - name: Smoke test production
        run: |
          sleep 15
          kubectl run smoke-test --rm -i --restart=Never \
            --image=curlimages/curl:8.6.0 \
            -- curl -sf http://url-shortener-api.url-shortener/actuator/health
          echo "Production smoke test passed"

      - name: Rollback production on failure
        if: failure()
        run: |
          echo "Production deploy failed — rolling back immediately"
          kubectl rollout undo deployment/url-shortener-api -n url-shortener
          kubectl rollout status deployment/url-shortener-api -n url-shortener --timeout=300s
          echo "Production rollback complete"

      - name: Notify Slack on success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: "url-shortener ${{ steps.tag.outputs.tag }} deployed to production ✅"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

      - name: Notify Slack on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: "url-shortener deploy to production FAILED ❌ — rolled back"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
