name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-progress runs for same branch/PR — saves CI minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ============================================================
  # JOB 1: Code quality checks
  # Fast-fail on formatting/style violations before running tests
  # ============================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Check formatting (Spotless)
        run: ./mvnw spotless:check -B -q

      - name: Check style (Checkstyle)
        run: ./mvnw checkstyle:check -B -q

  # ============================================================
  # JOB 2: Unit tests
  # Fast, no external dependencies
  # ============================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run unit tests
        run: >-
          ./mvnw test -B -Dspotless.skip=true -Dcheckstyle.skip=true
          "-Dtest=!*IntegrationTest,!*RepositoryTest,!ArchitectureTest"
        env:
          # Required by application.yml even when overridden by test profile
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: target/site/jacoco/jacoco.xml
          fail_ci_if_error: false

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: target/surefire-reports/

  # ============================================================
  # JOB 3: Integration tests (Testcontainers)
  # Requires Docker — uses ubuntu-latest which has Docker installed
  # ============================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Verify Docker is available
        run: docker info

      - name: Run integration tests
        run: >-
          ./mvnw test -B -Dspotless.skip=true -Dcheckstyle.skip=true
          "-Dtest=*IntegrationTest,*RepositoryTest,ArchitectureTest"
        env:
          TESTCONTAINERS_RYUK_DISABLED: "false"
          # Reuse containers across test classes for speed
          TESTCONTAINERS_REUSE_ENABLE: "true"
          # Explicitly point Testcontainers at the Docker socket so detection
          # never fails regardless of how Docker is installed in the runner.
          DOCKER_HOST: "unix:///var/run/docker.sock"
          TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: "/var/run/docker.sock"
          # Required by application.yml even when overridden by test profile
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Archive integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: target/surefire-reports/

  # ============================================================
  # JOB 4: Security scan
  # Trivy scans both the source and the built image for CVEs
  # ============================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: code-quality
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Populate Maven cache
        run: ./mvnw -B dependency:go-offline

      - name: Scan source with Trivy (filesystem)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs-results.sarif

  # ============================================================
  # JOB 5: Build Docker image
  # Only runs on main branch after all tests pass
  # ============================================================
  build-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build JAR (skip tests — already run)
        run: ./mvnw package -B -DskipTests -Dspotless.skip=true -Dcheckstyle.skip=true
        env:
          JWT_SECRET: "placeholder-overridden-at-deploy-time"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        id: docker-build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true        # SLSA build provenance attestation
          sbom: true              # Generate software bill of materials

      - name: Scan built image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.docker-build.outputs.digest }}
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL

      - name: Upload image scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-results.sarif

      # Output the image digest for the deploy job
      - name: Output image digest
        id: image-output
        run: echo "IMAGE_DIGEST=${{ steps.docker-build.outputs.digest }}" >> $GITHUB_OUTPUT
