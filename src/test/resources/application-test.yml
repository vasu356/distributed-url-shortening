# Test profile configuration.
# All values overridden by @DynamicPropertySource in AbstractIntegrationTest at runtime.
# Placeholder values here allow the Spring context to start before containers are up.

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/urlshortener_test
    username: test
    password: test
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: localhost:9092
  data:
    redis:
      host: localhost
      port: 6379

management:
  tracing:
    sampling:
      probability: 0.0  # disable distributed tracing overhead in tests

app:
  base-url: http://localhost:8080

  kafka:
    topics:
      click-events: url.click-events
      audit-events: url.audit-events
      lifecycle-events: url.lifecycle-events
      click-events-dlt: url.click-events.DLT
      audit-events-dlt: url.audit-events.DLT
      lifecycle-events-dlt: url.lifecycle-events.DLT
    consumer-groups:
      analytics: analytics-aggregator
      audit: audit-persister
      qr-generator: qr-code-generator
      metadata-scraper: metadata-scraper

  jwt:
    secret: dGVzdHNlY3JldGtleWZvcnVuaXR0ZXN0aW5nMTIzNDU2
    access-token-expiry: 3600
    refresh-token-expiry: 86400
    issuer: url-shortener
  rate-limit:
    anonymous:
      capacity: 10000
      refill-duration-seconds: 1
    authenticated:
      capacity: 100000

logging:
  level:
    com.urlshortener: DEBUG
    org.springframework.security: WARN
    org.testcontainers: INFO
