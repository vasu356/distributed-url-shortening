# Testcontainers configuration
# Ryuk is the resource-reaper container; keep it enabled so containers are cleaned
# up reliably after tests. Set to 'true' only if the CI environment explicitly
# lacks privileges for Ryuk (e.g. some rootless Docker setups).
ryuk.disabled=false

# Reuse containers across test classes to dramatically reduce suite runtime.
# Must also set TESTCONTAINERS_REUSE_ENABLE=true in CI environment, or set it here.
testcontainers.reuse.enable=true
