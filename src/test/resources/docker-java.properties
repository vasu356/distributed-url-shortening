# docker-java client configuration.
# Docker Engine 29+ raised its minimum accepted API version from 1.24 to 1.40.
# docker-java 3.3.x defaults to VERSION_1_32 as its probe version, which the
# daemon rejects with Status 400. Setting 1.44 satisfies Docker 29.x (min 1.40)
# while remaining compatible with any daemon from 18.09 onwards.
api.version=1.44
