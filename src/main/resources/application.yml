spring:
  application:
    name: url-shortener
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  threads:
    virtual:
      enabled: true

  lifecycle:
    timeout-per-shutdown-phase: 30s

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/urlshortener}
    username: ${DB_USERNAME:urlshortener}
    password: ${DB_PASSWORD:urlshortener}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: UrlShortenerPool
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      keepalive-time: 60000
      connection-test-query: SELECT 1
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 50
          fetch_size: 100
        order_inserts: true
        order_updates: true
        generate_statistics: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 1000ms
        shutdown-timeout: 200ms

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        linger.ms: 5
        batch.size: 16384
        compression.type: snappy
        delivery.timeout.ms: 60000
        spring.json.add.type.info.headers: true
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:url-shortener-main}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 500
      properties:
        isolation.level: read_committed
        max.poll.interval.ms: 300000
        session.timeout.ms: 30000
        heartbeat.interval.ms: 10000
        spring.json.trusted.packages: "com.urlshortener.*"
    listener:
      ack-mode: MANUAL_IMMEDIATE
      concurrency: 3

  cache:
    type: redis
    redis:
      time-to-live: 3600000
      use-key-prefix: true
      key-prefix: "url-shortener:"

server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,text/html,text/plain
    min-response-size: 1024
  shutdown: graceful
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,flyway,loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
    tags:
      application: ${spring.application.name}
      environment: ${ENVIRONMENT:local}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:1.0}
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}
  info:
    env:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    display-request-duration: true
  show-actuator: false

logging:
  level:
    root: INFO
    com.urlshortener: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.springframework.kafka: INFO

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

  cors:
    allowed-origins:
      - ${CORS_ORIGIN_1:http://localhost:3000}
      - ${CORS_ORIGIN_2:http://localhost:5173}

  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry: 900
    refresh-token-expiry: 604800
    issuer: url-shortener

  url:
    short-code-length: 7
    default-redirect-type: 302
    max-custom-alias-length: 50
    min-custom-alias-length: 3
    tombstone-days: 30

  rate-limit:
    anonymous:
      capacity: 10
      refill-tokens: 10
      refill-duration-seconds: 60
    authenticated:
      capacity: 1000
      refill-tokens: 1000
      refill-duration-seconds: 3600
    bulk-create:
      max-urls-per-request: 1000

  kafka:
    topics:
      click-events: url.click-events
      audit-events: url.audit-events
      lifecycle-events: url.lifecycle-events
      click-events-dlt: url.click-events.DLT
      audit-events-dlt: url.audit-events.DLT
      lifecycle-events-dlt: url.lifecycle-events.DLT
    consumer-groups:
      analytics: analytics-aggregator
      audit: audit-persister
      qr-generator: qr-code-generator
      metadata-scraper: metadata-scraper

  cache:
    url-ttl-seconds: 3600
    api-key-ttl-seconds: 300
    user-ttl-seconds: 600

resilience4j:
  circuitbreaker:
    instances:
      metadata-scraper:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        slow-call-duration-threshold: 3s
        slow-call-rate-threshold: 80
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 30s
        automatic-transition-from-open-to-half-open-enabled: true
  timelimiter:
    instances:
      metadata-scraper:
        timeout-duration: 5s
