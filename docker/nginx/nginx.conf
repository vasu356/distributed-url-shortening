worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/json;

    # ============================================================
    # Logging
    # ============================================================
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"correlation_id":"$http_x_correlation_id",'
            '"user_agent":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/access.log json_combined buffer=16k flush=5s;
    error_log  /var/log/nginx/error.log warn;

    # ============================================================
    # Performance
    # ============================================================
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75s;
    keepalive_requests 1000;
    server_tokens      off;   # hide NGINX version

    # Compression — reduces response size ~70% for JSON
    gzip on;
    gzip_comp_level 4;
    gzip_min_length 1024;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        text/xml;
    gzip_vary on;

    # Client limits
    client_max_body_size     10m;   # CSV import max size
    client_body_timeout      30s;
    client_header_timeout    10s;
    send_timeout             30s;

    # ============================================================
    # Rate limiting zones (per IP)
    # redirect zone: 1000 req/min — generous for redirect traffic
    # api zone: 100 req/min — standard API usage
    # auth zone: 10 req/min — slow brute-force
    # ============================================================
    limit_req_zone $binary_remote_addr zone=redirect:20m rate=1000r/m;
    limit_req_zone $binary_remote_addr zone=api:20m      rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m     rate=10r/m;
    limit_req_status 429;

    # ============================================================
    # Connection limiting
    # ============================================================
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_conn conn_limit 50;

    # ============================================================
    # Upstream: Spring Boot application
    # keepalive: reuse connections to backend (reduces TCP overhead)
    # ============================================================
    upstream app_backend {
        server app:8080;
        keepalive 64;
    }

    # ============================================================
    # Main server block
    # ============================================================
    server {
        listen 80;
        server_name _;

        # Security headers applied to all responses
        add_header X-Frame-Options            "DENY"              always;
        add_header X-Content-Type-Options     "nosniff"           always;
        add_header X-XSS-Protection           "1; mode=block"     always;
        add_header Referrer-Policy            "no-referrer"       always;
        add_header Content-Security-Policy    "default-src 'self'; frame-ancestors 'none'" always;
        add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()" always;
        # HSTS: enable when TLS is configured
        # add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;

        # Health check endpoint — no auth, no rate limit
        location = /health {
            access_log off;
            return 200 '{"status":"UP"}';
            add_header Content-Type application/json;
        }

        # Redirect hot path — highest rate limit, dedicated zone
        location ~ ^/r/[A-Za-z0-9_-]+$ {
            limit_req zone=redirect burst=200 nodelay;
            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_send_timeout    10s;
            proxy_read_timeout    10s;
        }

        # Auth endpoints — strict rate limit (brute-force protection)
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Prometheus metrics — restrict to internal network only
        location /actuator/prometheus {
            # In production: restrict to monitoring network CIDR
            # allow 10.0.0.0/8;
            # deny all;
            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Actuator endpoints — internal only
        location /actuator/ {
            # allow 10.0.0.0/8;
            # deny all;
            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # API and all other routes
        location / {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # Hide backend errors
        error_page 502 503 504 /50x.json;
        location = /50x.json {
            return 503 '{"status":503,"title":"Service Unavailable","detail":"The service is temporarily unavailable"}';
            add_header Content-Type application/json;
        }
    }
}
