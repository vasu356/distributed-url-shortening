# ============================================================
# Local development stack
# Brings up the full platform: app + postgres + redis + kafka +
# nginx + prometheus + grafana + jaeger
#
# Usage:
#   docker compose up -d          # start all
#   docker compose logs -f app    # tail app logs
#   docker compose down -v        # stop and remove volumes
#
# Jaeger ports can be overridden via environment variables to
# avoid conflicts with other local projects (e.g. VaultFlow):
#   JAEGER_UI_PORT        — default 16687, maps to container 16686
#   JAEGER_OTLP_HTTP_PORT — default 4418,  maps to container 4318
#   JAEGER_OTLP_GRPC_PORT — default 4417,  maps to container 4317
# ============================================================

x-common-env: &common-env
  SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
  DB_URL: jdbc:postgresql://postgres:5432/urlshortener
  DB_USERNAME: ${DB_USERNAME}
  DB_PASSWORD: ${DB_PASSWORD}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  KAFKA_CONSUMER_GROUP: url-shortener-main
  APP_BASE_URL: http://localhost:8080
  OTLP_ENDPOINT: http://jaeger:4318/v1/traces
  JWT_SECRET: ${JWT_SECRET}
  ENVIRONMENT: local

services:

  # ============================================================
  # APPLICATION
  # ============================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      cache_from:
        - url-shortener:local
    image: url-shortener:local
    container_name: url-shortener-app
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "java", "-XX:TieredStopAtLevel=1", "-cp", "/app/healthcheck", "HealthCheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - urlshortener
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # ============================================================
  # POSTGRESQL
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: url-shortener-postgres
    environment:
      POSTGRES_DB: urlshortener
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /data/postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/data/postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - urlshortener
    restart: unless-stopped

  # ============================================================
  # REDIS
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: url-shortener-redis
    command: redis-server --save 60 1 --loglevel warning --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - urlshortener
    restart: unless-stopped

  # ============================================================
  # KAFKA + ZOOKEEPER
  # ============================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: url-shortener-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - urlshortener
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: url-shortener-kafka
    depends_on:
      - zookeeper
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"  # topics created programmatically via KafkaConfig
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - urlshortener
    restart: unless-stopped

  # ============================================================
  # NGINX — reverse proxy
  # ============================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: url-shortener-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - urlshortener
    restart: unless-stopped

  # ============================================================
  # PROMETHEUS
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: url-shortener-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - urlshortener
    restart: unless-stopped

  # ============================================================
  # GRAFANA
  # ============================================================
  grafana:
    image: grafana/grafana:10.4.0
    container_name: url-shortener-grafana
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - urlshortener
    restart: unless-stopped

  # ============================================================
  # JAEGER — distributed tracing
  # Override host ports via JAEGER_UI_PORT, JAEGER_OTLP_HTTP_PORT,
  # JAEGER_OTLP_GRPC_PORT in your .env if another project (e.g.
  # VaultFlow) already occupies 16686, 4318, or 4317.
  # ============================================================
  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: url-shortener-jaeger
    ports:
      - "${JAEGER_UI_PORT:-16687}:16686"        # UI
      - "${JAEGER_OTLP_HTTP_PORT:-4418}:4318"   # OTLP HTTP
      - "${JAEGER_OTLP_GRPC_PORT:-4417}:4317"   # OTLP gRPC
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - urlshortener
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log:
  prometheus_data:
  grafana_data:

networks:
  urlshortener:
    driver: bridge
