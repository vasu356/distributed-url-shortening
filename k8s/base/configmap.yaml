apiVersion: v1
kind: ConfigMap
metadata:
  name: url-shortener-config
  namespace: url-shortener
  labels:
    app.kubernetes.io/name: url-shortener
    app.kubernetes.io/component: config
data:
  SPRING_PROFILES_ACTIVE: "prod"
  SERVER_PORT: "8080"
  APP_BASE_URL: "https://short.example.com"
  ENVIRONMENT: "production"
  REDIS_PORT: "6379"
  OTLP_ENDPOINT: "http://jaeger-collector.observability:4318/v1/traces"
  TRACING_SAMPLE_RATE: "0.1"
  # JVM flags — resource-aware for container deployment
  JAVA_OPTS: >-
    -XX:+UseContainerSupport
    -XX:MaxRAMPercentage=75.0
    -XX:InitialRAMPercentage=50.0
    -XX:+OptimizeStringConcat
    -Djava.security.egd=file:/dev/./urandom
    -Dfile.encoding=UTF-8
---
# Secret template — values are base64-encoded placeholders.
# In production: use External Secrets Operator with AWS Secrets Manager
# or HashiCorp Vault, NOT hardcoded values.
apiVersion: v1
kind: Secret
metadata:
  name: url-shortener-secrets
  namespace: url-shortener
  labels:
    app.kubernetes.io/name: url-shortener
    app.kubernetes.io/component: config
  annotations:
    # In production, manage this via External Secrets Operator:
    # externalsecrets.external-secrets.io/sync-policy: Owner
type: Opaque
stringData:
  # REPLACE with actual secrets via CI/CD or External Secrets Operator
  DB_URL: "jdbc:postgresql://postgres-rds.example.com:5432/urlshortener"
  DB_USERNAME: "urlshortener"
  DB_PASSWORD: "REPLACE_ME"
  REDIS_HOST: "elasticache.example.com"
  REDIS_PASSWORD: "REPLACE_ME"
  KAFKA_BOOTSTRAP_SERVERS: "kafka-1:9092,kafka-2:9092,kafka-3:9092"
  JWT_SECRET: "REPLACE_WITH_256_BIT_BASE64_SECRET"
  ACTUATOR_PASSWORD: "REPLACE_ME"
