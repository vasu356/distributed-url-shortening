apiVersion: v1
kind: Namespace
metadata:
  name: url-shortener
  labels:
    app.kubernetes.io/name: url-shortener
    environment: production
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: url-shortener-quota
  namespace: url-shortener
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    pods: "50"
    services: "10"
    persistentvolumeclaims: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: url-shortener-limits
  namespace: url-shortener
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 256Mi
      max:
        cpu: "4"
        memory: 4Gi
