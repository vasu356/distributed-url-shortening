---
# Service: internal cluster DNS for the API pods
apiVersion: v1
kind: Service
metadata:
  name: url-shortener-api
  namespace: url-shortener
  labels:
    app.kubernetes.io/name: url-shortener
    app.kubernetes.io/component: api
  annotations:
    # Prometheus ServiceMonitor autodiscovery
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/actuator/prometheus"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: url-shortener
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
---
# Ingress: exposes the service via NGINX Ingress Controller with TLS
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: url-shortener-ingress
  namespace: url-shortener
  labels:
    app.kubernetes.io/name: url-shortener
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "5"
    nginx.ingress.kubernetes.io/rate-limit: "1000"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    # TLS: cert-manager auto-provisions from Let's Encrypt
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Security headers via NGINX Ingress
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "DENY" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "no-referrer" always;
      add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none'" always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
spec:
  tls:
    - hosts:
        - short.example.com
      secretName: url-shortener-tls
  rules:
    - host: short.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: url-shortener-api
                port:
                  number: 80
---
# HPA: scale on CPU and custom redirect RPS metric
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: url-shortener-api-hpa
  namespace: url-shortener
  labels:
    app.kubernetes.io/name: url-shortener
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: url-shortener-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    # Scale on CPU — simplest reliable metric
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    # Scale on memory too — prevents OOMKill under load
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60     # wait 60s before scaling up again
      policies:
        - type: Pods
          value: 2                        # add at most 2 pods per scale event
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300    # wait 5min before scaling down (prevents flapping)
      policies:
        - type: Pods
          value: 1                        # remove 1 pod at a time
          periodSeconds: 120
---
# PodDisruptionBudget: ensure at least 2 pods available during voluntary disruptions
# (node drain, rolling deploy, cluster upgrade)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: url-shortener-api-pdb
  namespace: url-shortener
  labels:
    app.kubernetes.io/name: url-shortener
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: url-shortener
      app.kubernetes.io/component: api
